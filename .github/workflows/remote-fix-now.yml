name: Remote Fix Nginx and Env

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH fix on server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_SERVER_USERNAME }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
        run: |
          set -euo pipefail
          echo "${{ secrets.DEPLOY_SERVER_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          SSH_OPTS="-o StrictHostKeyChecking=no -i /tmp/ssh_key"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"

          scp $SSH_OPTS deploy/remote-fix-nginx-env.sh "$REMOTE:/root/profile-v1/remote-fix-nginx-env.sh"
          scp $SSH_OPTS deploy/nginx/profile-platform.conf "$REMOTE:/root/profile-v1/nginx/profile-platform.conf"
          scp $SSH_OPTS deploy/check-gateway-health.sh "$REMOTE:/root/profile-v1/check-gateway-health.sh"
          ssh $SSH_OPTS "$REMOTE" "chmod +x /root/profile-v1/remote-fix-nginx-env.sh /root/profile-v1/check-gateway-health.sh && /root/profile-v1/remote-fix-nginx-env.sh"
          rm -f /tmp/ssh_key
