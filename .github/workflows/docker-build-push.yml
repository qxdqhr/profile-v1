name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [web, calendar, teach-hub]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        run: |
          echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login \
            -u "${{ secrets.ALIYUN_USERNAME }}" \
            --password-stdin ${{ env.REGISTRY }} || exit 1

      - name: Build Docker image (${{ matrix.app }})
        run: |
          docker buildx build --platform linux/amd64 \
            -f apps/${{ matrix.app }}/Dockerfile \
            -t qhr-profile-${{ matrix.app }}:amd64 \
            --load .

      - name: Tag and push (${{ matrix.app }})
        run: |
          NEW_TAG=${{ github.run_number }}
          IMAGE=${{ env.REGISTRY }}/qhr-profile-${{ matrix.app }}:${NEW_TAG}
          docker tag qhr-profile-${{ matrix.app }}:amd64 "$IMAGE"
          docker push "$IMAGE"
          if [ "${{ matrix.app }}" = "web" ]; then
            LEGACY=${{ env.REGISTRY }}/qhr-profile:${NEW_TAG}
            docker tag qhr-profile-web:amd64 "$LEGACY"
            docker push "$LEGACY"
          fi

  build-teach-hub-mobile:
    name: Build TeachHub Mobile APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    env:
      EXPO_ANDROID_VERSION_CODE: ${{ github.run_number }}
    outputs:
      apk_filename: ${{ steps.apk_meta.outputs.filename }}
      apk_download_url: ${{ steps.apk_meta.outputs.download_url }}
      release_url: ${{ steps.apk_meta.outputs.release_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decrypt production config for API URLs
        id: cfg
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "SOPS_AGE_KEY 未配置，无法解析生产 API 地址" >&2
            exit 1
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq age
          DEPLOY_CFG_DIR=/tmp/profile-v1-mobile
          mkdir -p "$DEPLOY_CFG_DIR"
          printf '%s\n' "$SOPS_AGE_KEY" > "$DEPLOY_CFG_DIR/age-key.txt"
          chmod 600 "$DEPLOY_CFG_DIR/age-key.txt"
          SOPS_AGE_KEY_FILE="$DEPLOY_CFG_DIR/age-key.txt" \
            ./scripts/config-decrypt-production.sh "$DEPLOY_CFG_DIR/app.config.yaml"
          PUBLIC_URL="$(grep -E '^\s+publicUrl:' "$DEPLOY_CFG_DIR/app.config.yaml" | head -1 | sed -E 's/.*publicUrl:\s*"?([^"#]+)"?.*/\1/' | tr -d "'")"
          if [ -z "$PUBLIC_URL" ]; then
            echo "无法从 app.config 解析 auth.publicUrl" >&2
            exit 1
          fi
          echo "auth_base_url=${PUBLIC_URL}" >> "$GITHUB_OUTPUT"
          echo "api_base_url=${PUBLIC_URL}/teach-hub" >> "$GITHUB_OUTPUT"
          echo "public_url=${PUBLIC_URL}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate Android signing secrets
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: ${name}" >&2
              exit 1
            fi
          done
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build signed release APK
        run: bash apps/teach-hub-mobile/scripts/android-release-build.sh
        env:
          APP_VERSION: '0.1.0'
          EXPO_PUBLIC_AUTH_BASE_URL: ${{ steps.cfg.outputs.auth_base_url }}
          EXPO_PUBLIC_TEACH_HUB_API_BASE_URL: ${{ steps.cfg.outputs.api_base_url }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Resolve APK metadata
        id: apk_meta
        run: |
          APK_PATH="$(ls -t apps/teach-hub-mobile/dist/*.apk | head -1)"
          APK_NAME="$(basename "$APK_PATH")"
          TAG_NAME="teach-hub-mobile-ci-${GITHUB_RUN_NUMBER}"
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"
          DOWNLOAD_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${APK_NAME}"
          echo "filename=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"
          echo "download_url=${DOWNLOAD_URL}" >> "$GITHUB_OUTPUT"
          echo "Built APK: ${APK_PATH}"
          echo "Release: ${RELEASE_URL}"

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk_meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: TeachHub Mobile CI #${{ github.run_number }}
          body: |
            Android release APK from main CI build.

            - Run: #${{ github.run_number }}
            - versionCode: `${{ github.run_number }}`
            - Auth: `${{ steps.cfg.outputs.auth_base_url }}`
            - API: `${{ steps.cfg.outputs.api_base_url }}`
          files: apps/teach-hub-mobile/dist/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decrypt production config
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "ERROR: GitHub Secret SOPS_AGE_KEY 未配置" >&2
            echo "请将 config/keys/age-key.txt 全文添加到仓库 Secrets → SOPS_AGE_KEY" >&2
            exit 1
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq age
          DEPLOY_CFG_DIR=/tmp/profile-v1-deploy
          mkdir -p "$DEPLOY_CFG_DIR"
          printf '%s\n' "$SOPS_AGE_KEY" > "$DEPLOY_CFG_DIR/age-key.txt"
          chmod 600 "$DEPLOY_CFG_DIR/age-key.txt"
          SOPS_AGE_KEY_FILE="$DEPLOY_CFG_DIR/age-key.txt" \
            ./scripts/config-decrypt-production.sh "$DEPLOY_CFG_DIR/app.config.yaml"

      - name: Deploy gateway stack to remote server
        env:
          REGISTRY: crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht
        run: |
          NEW_TAG=${{ github.run_number }}
          DEPLOY_CFG_DIR=/tmp/profile-v1-deploy
          DEPLOY_USER="${{ secrets.DEPLOY_SERVER_USERNAME }}"
          DEPLOY_HOST="${{ secrets.DEPLOY_SERVER_HOST }}"
          SSH_OPTS="-o StrictHostKeyChecking=no -i /tmp/ssh_key"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"

          echo "${{ secrets.DEPLOY_SERVER_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

          echo "=== 同步配置与 deploy 文件 ==="
          ssh $SSH_OPTS "$REMOTE" "mkdir -p /root/profile-v1/nginx"
          scp $SSH_OPTS "$DEPLOY_CFG_DIR/app.config.yaml" "$REMOTE:/root/profile-v1/app.config.yaml"
          scp $SSH_OPTS deploy/docker-compose.gateway.yml "$REMOTE:/root/profile-v1/docker-compose.gateway.yml"
          scp $SSH_OPTS deploy/nginx/profile-platform.conf "$REMOTE:/root/profile-v1/nginx/profile-platform.conf"
          scp $SSH_OPTS deploy/nginx/proxy-params.conf "$REMOTE:/root/profile-v1/nginx/proxy-params.conf"
          scp $SSH_OPTS deploy/deploy-profile-v1.sh "$REMOTE:/root/profile-v1/deploy-profile-v1.sh"
          scp $SSH_OPTS deploy/derive-database-url.sh "$REMOTE:/root/profile-v1/derive-database-url.sh"
          scp $SSH_OPTS deploy/fix-gateway-remote.sh "$REMOTE:/root/profile-v1/fix-gateway-remote.sh"
          scp $SSH_OPTS deploy/wait-gateway-ready.sh "$REMOTE:/root/profile-v1/wait-gateway-ready.sh"
          scp $SSH_OPTS deploy/ensure-database-url.sh "$REMOTE:/root/profile-v1/ensure-database-url.sh"
          scp $SSH_OPTS deploy/ensure-calendar-schema.sh "$REMOTE:/root/profile-v1/ensure-calendar-schema.sh"
          scp $SSH_OPTS deploy/smoke-test-gateway.sh "$REMOTE:/root/profile-v1/smoke-test-gateway.sh"
          scp $SSH_OPTS deploy/check-gateway-health.sh "$REMOTE:/root/profile-v1/check-gateway-health.sh"
          scp $SSH_OPTS deploy/audit-outer-nginx.sh "$REMOTE:/root/profile-v1/audit-outer-nginx.sh"
          scp $SSH_OPTS deploy/nginx/outer-ubuntu-qhr062.conf "$REMOTE:/root/profile-v1/nginx/outer-ubuntu-qhr062.conf"
          scp $SSH_OPTS deploy/nginx/proxy-params-outer.conf "$REMOTE:/root/profile-v1/nginx/proxy-params-outer.conf"
          ssh $SSH_OPTS "$REMOTE" "chmod 644 /root/profile-v1/app.config.yaml && chmod 755 /root/profile-v1/deploy-profile-v1.sh /root/profile-v1/derive-database-url.sh /root/profile-v1/fix-gateway-remote.sh /root/profile-v1/wait-gateway-ready.sh /root/profile-v1/ensure-database-url.sh /root/profile-v1/ensure-calendar-schema.sh /root/profile-v1/smoke-test-gateway.sh /root/profile-v1/check-gateway-health.sh /root/profile-v1/audit-outer-nginx.sh"

          ssh $SSH_OPTS "$REMOTE" \
            "REGISTRY=${REGISTRY} IMAGE_TAG=${NEW_TAG} GATEWAY_PORT=3000 /root/profile-v1/deploy-profile-v1.sh"

          echo "=== 幂等修复 Postgres/DATABASE_URL + 冒烟测试（不再二次 down/up）==="
          ssh $SSH_OPTS "$REMOTE" "POST_DEPLOY=1 /root/profile-v1/fix-gateway-remote.sh"

          rm -f /tmp/ssh_key "$DEPLOY_CFG_DIR/age-key.txt" "$DEPLOY_CFG_DIR/app.config.yaml"

  notify:
    name: Notify Feishu
    runs-on: ubuntu-latest
    needs: [build, deploy-web, build-teach-hub-mobile]
    if: always() && !cancelled()
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decrypt production config for Feishu webhook
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "SOPS_AGE_KEY 未配置，跳过解密（将使用 FEISHU_WEBHOOK_URL Secret）"
            exit 0
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq age
          DEPLOY_CFG_DIR=/tmp/profile-v1-notify
          mkdir -p "$DEPLOY_CFG_DIR"
          printf '%s\n' "$SOPS_AGE_KEY" > "$DEPLOY_CFG_DIR/age-key.txt"
          chmod 600 "$DEPLOY_CFG_DIR/age-key.txt"
          SOPS_AGE_KEY_FILE="$DEPLOY_CFG_DIR/age-key.txt" \
            ./scripts/config-decrypt-production.sh "$DEPLOY_CFG_DIR/app.config.yaml"
          echo "APP_CONFIG_PATH=$DEPLOY_CFG_DIR/app.config.yaml" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Send Feishu notification
        continue-on-error: true
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          CI_NOTIFY_STATUS: ${{ needs.build.result == 'success' && (needs.deploy-web.result == 'success' || needs.deploy-web.result == 'skipped') && 'success' || needs.build.result }}
          CI_IMAGE_TAG: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.result == 'success' && format('web:{0} calendar:{0} teach-hub:{0}', github.run_number) || '' }}
          CI_TEACH_HUB_APK_RELEASE_URL: ${{ needs.build-teach-hub-mobile.result == 'success' && needs.build-teach-hub-mobile.outputs.release_url || '' }}
          CI_TEACH_HUB_APK_DOWNLOAD_URL: ${{ needs.build-teach-hub-mobile.result == 'success' && needs.build-teach-hub-mobile.outputs.apk_download_url || '' }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: node scripts/send-ci-feishu-notify.mjs
