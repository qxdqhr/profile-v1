name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        run: |
          echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login \
            -u "${{ secrets.ALIYUN_USERNAME }}" \
            --password-stdin crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com || exit 1

      - name: Clean up Docker system
        run: |
          docker system prune -a --volumes -f

      - name: Build Docker image
        run: |
          docker buildx build --platform linux/amd64 -t nextjs-name:amd64 --load .

      - name: Tag Docker image
        run: |
          NEW_TAG=${{ github.run_number }}
          docker tag nextjs-name:amd64 crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht/qhr-profile:${NEW_TAG}

      - name: Push Docker image
        run: |
          NEW_TAG=${{ github.run_number }}
          docker push crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht/qhr-profile:${NEW_TAG}

      - name: Decrypt production config
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "ERROR: GitHub Secret SOPS_AGE_KEY 未配置" >&2
            echo "请将 config/keys/age-key.txt 全文添加到仓库 Secrets → SOPS_AGE_KEY" >&2
            exit 1
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq age
          DEPLOY_CFG_DIR=/tmp/profile-v1-deploy
          mkdir -p "$DEPLOY_CFG_DIR"
          printf '%s\n' "$SOPS_AGE_KEY" > "$DEPLOY_CFG_DIR/age-key.txt"
          chmod 600 "$DEPLOY_CFG_DIR/age-key.txt"
          SOPS_AGE_KEY_FILE="$DEPLOY_CFG_DIR/age-key.txt" \
            ./scripts/config-decrypt-production.sh "$DEPLOY_CFG_DIR/app.config.yaml"

      - name: Deploy to remote server
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          NEW_TAG=${{ github.run_number }}
          DEPLOY_CFG_DIR=/tmp/profile-v1-deploy
          DEPLOY_USER="${{ secrets.DEPLOY_SERVER_USERNAME }}"
          DEPLOY_HOST="${{ secrets.DEPLOY_SERVER_HOST }}"
          SSH_OPTS="-o StrictHostKeyChecking=no -i /tmp/ssh_key"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"

          echo "${{ secrets.DEPLOY_SERVER_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

          echo "=== 同步生产配置到服务器 ==="
          ssh $SSH_OPTS "$REMOTE" "mkdir -p /root/profile-v1"
          scp $SSH_OPTS "$DEPLOY_CFG_DIR/app.config.yaml" "$REMOTE:/root/profile-v1/app.config.yaml"
          ssh $SSH_OPTS "$REMOTE" "chmod 644 /root/profile-v1/app.config.yaml"

          ssh $SSH_OPTS "$REMOTE" << EOF
            set -e
            echo "=== 部署前磁盘 ==="
            df -h /
            echo "=== 清理远端未使用镜像（保留运行中容器）==="
            docker image prune -a -f || true
            echo "=== 清理后磁盘 ==="
            df -h /
            docker pull crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht/qhr-profile:${NEW_TAG}
            docker stop my_container || true
            docker rm my_container || true
            docker run -d \
              -p 3000:3000 \
              --name my_container \
              --restart unless-stopped \
              -e APP_CONFIG_ENV=production \
              -v /root/profile-v1/app.config.yaml:/app/config/app.config.production.yaml:ro \
              crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht/qhr-profile:${NEW_TAG}
            echo "=== 部署完成 ==="
            docker ps --filter name=my_container
            df -h /
          EOF

          rm -f /tmp/ssh_key "$DEPLOY_CFG_DIR/age-key.txt" "$DEPLOY_CFG_DIR/app.config.yaml"

  notify:
    name: Notify Feishu
    runs-on: ubuntu-latest
    needs: build
    if: always() && !cancelled()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decrypt production config for Feishu webhook
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "SOPS_AGE_KEY 未配置，跳过解密（将使用 FEISHU_WEBHOOK_URL Secret）"
            exit 0
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq age
          DEPLOY_CFG_DIR=/tmp/profile-v1-notify
          mkdir -p "$DEPLOY_CFG_DIR"
          printf '%s\n' "$SOPS_AGE_KEY" > "$DEPLOY_CFG_DIR/age-key.txt"
          chmod 600 "$DEPLOY_CFG_DIR/age-key.txt"
          SOPS_AGE_KEY_FILE="$DEPLOY_CFG_DIR/age-key.txt" \
            ./scripts/config-decrypt-production.sh "$DEPLOY_CFG_DIR/app.config.yaml"
          echo "APP_CONFIG_PATH=$DEPLOY_CFG_DIR/app.config.yaml" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Collect commit and run metadata
        id: ci_meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          EVENT="${{ github.event_name }}"
          BEFORE="${{ github.event.before }}"

          COMMIT_MSG=$(git log -1 --format='%s' "$SHA")
          {
            echo "commit_message<<EOF"
            echo "$COMMIT_MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$EVENT" = "push" ] && [ -n "${BEFORE:-}" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            COMMIT_COUNT=$(git rev-list --count "${BEFORE}..${SHA}")
            CHANGE_SUMMARY=$(git log --reverse --format='• %s (%h)' "${BEFORE}..${SHA}" | head -20)
          else
            COMMIT_COUNT=1
            CHANGE_SUMMARY=$(git log -1 --format='• %s (%h)' "$SHA")
          fi

          {
            echo "commit_count=$COMMIT_COUNT"
            echo "change_summary<<EOF"
            echo "$CHANGE_SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          RUN_JSON=$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")

          RUN_STARTED=$(node -e "const d=JSON.parse(process.argv[1]); process.stdout.write(d.run_started_at||'');" "$RUN_JSON")
          FINISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -n "$RUN_STARTED" ]; then
            DURATION=$(node -e "
              const start = Date.parse(process.argv[1]);
              const end = Date.parse(process.argv[2]);
              if (Number.isNaN(start) || Number.isNaN(end) || end < start) process.exit(0);
              process.stdout.write(String(Math.round((end - start) / 1000)));
            " "$RUN_STARTED" "$FINISHED_AT")
          else
            DURATION=""
          fi

          {
            echo "run_started_at=$RUN_STARTED"
            echo "finished_at=$FINISHED_AT"
            echo "build_duration_seconds=$DURATION"
          } >> "$GITHUB_OUTPUT"

      - name: Send Feishu notification
        continue-on-error: true
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          CI_NOTIFY_STATUS: ${{ needs.build.result }}
          CI_IMAGE_TAG: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.result == 'success' && format('crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht/qhr-profile:{0}', github.run_number) || '' }}
          CI_COMMIT_MESSAGE: ${{ steps.ci_meta.outputs.commit_message }}
          CI_CHANGE_SUMMARY: ${{ steps.ci_meta.outputs.change_summary }}
          CI_COMMIT_COUNT: ${{ steps.ci_meta.outputs.commit_count }}
          CI_RUN_STARTED_AT: ${{ steps.ci_meta.outputs.run_started_at }}
          CI_FINISHED_AT: ${{ steps.ci_meta.outputs.finished_at }}
          CI_BUILD_DURATION_SECONDS: ${{ steps.ci_meta.outputs.build_duration_seconds }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: node scripts/send-ci-feishu-notify.mjs
