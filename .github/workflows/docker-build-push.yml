name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        run: |
          echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login \
            -u "${{ secrets.ALIYUN_USERNAME }}" \
            --password-stdin crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com || exit 1

      - name: Clean up Docker system
        run: |
          docker system prune -a --volumes -f

      - name: Build Docker image
        run: |
          docker buildx build --platform linux/amd64 -t nextjs-name:amd64 --load .

      - name: Tag Docker image
        run: |
          NEW_TAG=${{ github.run_number }}
          docker tag nextjs-name:amd64 crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht/qhr-profile:${NEW_TAG}

      - name: Push Docker image
        run: |
          NEW_TAG=${{ github.run_number }}
          docker push crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht/qhr-profile:${NEW_TAG}

      - name: Decrypt production config
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "ERROR: GitHub Secret SOPS_AGE_KEY 未配置" >&2
            echo "请将 config/keys/age-key.txt 全文添加到仓库 Secrets → SOPS_AGE_KEY" >&2
            exit 1
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq age
          DEPLOY_CFG_DIR=/tmp/profile-v1-deploy
          mkdir -p "$DEPLOY_CFG_DIR"
          printf '%s\n' "$SOPS_AGE_KEY" > "$DEPLOY_CFG_DIR/age-key.txt"
          chmod 600 "$DEPLOY_CFG_DIR/age-key.txt"
          SOPS_AGE_KEY_FILE="$DEPLOY_CFG_DIR/age-key.txt" \
            ./scripts/config-decrypt-production.sh "$DEPLOY_CFG_DIR/app.config.yaml"

      - name: Deploy to remote server
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          NEW_TAG=${{ github.run_number }}
          DEPLOY_CFG_DIR=/tmp/profile-v1-deploy
          DEPLOY_USER="${{ secrets.DEPLOY_SERVER_USERNAME }}"
          DEPLOY_HOST="${{ secrets.DEPLOY_SERVER_HOST }}"
          SSH_OPTS="-o StrictHostKeyChecking=no -i /tmp/ssh_key"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"

          echo "${{ secrets.DEPLOY_SERVER_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

          echo "=== 同步生产配置到服务器 ==="
          ssh $SSH_OPTS "$REMOTE" "mkdir -p /root/profile-v1"
          scp $SSH_OPTS "$DEPLOY_CFG_DIR/app.config.yaml" "$REMOTE:/root/profile-v1/app.config.yaml"
          ssh $SSH_OPTS "$REMOTE" "chmod 644 /root/profile-v1/app.config.yaml"

          ssh $SSH_OPTS "$REMOTE" << EOF
            set -e
            echo "=== 部署前磁盘 ==="
            df -h /
            echo "=== 清理远端未使用镜像（保留运行中容器）==="
            docker image prune -a -f || true
            echo "=== 清理后磁盘 ==="
            df -h /
            docker pull crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht/qhr-profile:${NEW_TAG}
            docker stop my_container || true
            docker rm my_container || true
            docker run -d \
              -p 3000:3000 \
              --name my_container \
              --restart unless-stopped \
              -e APP_CONFIG_ENV=production \
              -v /root/profile-v1/app.config.yaml:/app/config/app.config.production.yaml:ro \
              crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht/qhr-profile:${NEW_TAG}
            echo "=== 部署完成 ==="
            docker ps --filter name=my_container
            df -h /
          EOF

          rm -f /tmp/ssh_key "$DEPLOY_CFG_DIR/age-key.txt" "$DEPLOY_CFG_DIR/app.config.yaml"

  notify:
    name: Notify Feishu
    runs-on: ubuntu-latest
    needs: build
    if: always() && !cancelled()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          CI_NOTIFY_STATUS: ${{ needs.build.result }}
          CI_IMAGE_TAG: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.result == 'success' && format('crpi-pnnot5dqi45utyya.cn-beijing.personal.cr.aliyuncs.com/qhrqht/qhr-profile:{0}', github.run_number) || '' }}
        run: pnpm exec tsx scripts/send-ci-feishu-notify.ts
