name: CD Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          tar -czf artifacts/vocaloider-build-${{ github.sha }}.tar.gz \
            README.md DEVELOPMENT.md page.tsx StudyMusic .github

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vocaloider-package
          path: artifacts/*.tar.gz
