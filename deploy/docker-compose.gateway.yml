# 生产网关栈：nginx + web + calendar + teach-hub
# 用法见 deploy/MIGRATION-RUNBOOK.md

services:
  web:
    image: ${REGISTRY}/qhr-profile-web:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      APP_CONFIG_ENV: production
      APP_CONFIG_PATH: config/app.config.production.yaml
      # 容器内访问宿主机 Postgres 时，在 .env 覆盖（勿用公网域名，易 hairpin 失败）：
      # DATABASE_URL=postgresql://postgres:PASSWORD@host.docker.internal:5432/exam_system
      DATABASE_URL: ${DATABASE_URL:-}
      NEXT_PUBLIC_CALENDAR_URL: /calendar
      NEXT_PUBLIC_TEACH_HUB_URL: /teach-hub
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./app.config.yaml:/app/config/app.config.production.yaml:ro
    expose:
      - '3000'
    networks:
      - profile

  calendar:
    image: ${REGISTRY}/qhr-profile-calendar:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      APP_CONFIG_ENV: production
      NEXT_PUBLIC_BASE_PATH: /calendar
    volumes:
      - ./app.config.yaml:/app/config/app.config.production.yaml:ro
    expose:
      - '3001'
    networks:
      - profile

  teach_hub:
    image: ${REGISTRY}/qhr-profile-teach-hub:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      APP_CONFIG_ENV: production
      NEXT_PUBLIC_BASE_PATH: /teach-hub
      NEXT_PUBLIC_TEACH_HUB_BASE_URL: /teach-hub
    volumes:
      - ./app.config.yaml:/app/config/app.config.production.yaml:ro
    expose:
      - '3002'
    networks:
      - profile

  nginx:
    image: docker.m.daocloud.io/library/nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - calendar
      - teach_hub
    ports:
      - '${GATEWAY_PORT:-3000}:80'
    volumes:
      - ./nginx/profile-platform.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy-params.conf:/etc/nginx/proxy-params.conf:ro
    networks:
      - profile

networks:
  profile:
    driver: bridge
