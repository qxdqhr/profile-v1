# 生产网关栈：nginx + web + calendar + teach-hub + showmasterpiece + money-research + node-notes
# 用法见 deploy/MIGRATION-RUNBOOK.md

services:
  web:
    image: ${REGISTRY}/qhr-profile-web:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      APP_CONFIG_ENV: production
      APP_CONFIG_PATH: /app/config/app.config.production.yaml
      # 容器内访问宿主机 Postgres 时，在 .env 覆盖（勿用公网域名，易 hairpin 失败）：
      # DATABASE_URL=postgresql://postgres:PASSWORD@host.docker.internal:5432/exam_system
      DATABASE_URL: ${DATABASE_URL:-}
      NEXT_PUBLIC_CALENDAR_URL: /calendar
      NEXT_PUBLIC_TEACH_HUB_URL: /teach-hub
      NEXT_PUBLIC_SHOWMASTERPIECE_URL: /showmasterpiece
      NEXT_PUBLIC_MONEY_RESEARCH_URL: /money-research
      NEXT_PUBLIC_NODE_NOTES_URL: /node-notes
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./app.config.yaml:/app/config/app.config.production.yaml:ro
    expose:
      - '3000'
    networks:
      - profile

  calendar:
    image: ${REGISTRY}/qhr-profile-calendar:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      APP_CONFIG_ENV: production
      APP_CONFIG_PATH: /app/config/app.config.production.yaml
      DATABASE_URL: ${DATABASE_URL:-}
      NEXT_PUBLIC_BASE_PATH: /calendar
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./app.config.yaml:/app/config/app.config.production.yaml:ro
    expose:
      - '3001'
    networks:
      - profile

  teach_hub:
    image: ${REGISTRY}/qhr-profile-teach-hub:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      APP_CONFIG_ENV: production
      APP_CONFIG_PATH: /app/config/app.config.production.yaml
      DATABASE_URL: ${DATABASE_URL:-}
      NEXT_PUBLIC_BASE_PATH: /teach-hub
      NEXT_PUBLIC_TEACH_HUB_BASE_URL: ''
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./app.config.yaml:/app/config/app.config.production.yaml:ro
    expose:
      - '3002'
    networks:
      - profile

  showmasterpiece:
    image: ${REGISTRY}/qhr-profile-showmasterpiece:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      APP_CONFIG_ENV: production
      APP_CONFIG_PATH: /app/config/app.config.production.yaml
      DATABASE_URL: ${DATABASE_URL:-}
      NEXT_PUBLIC_BASE_PATH: /showmasterpiece
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./app.config.yaml:/app/config/app.config.production.yaml:ro
    expose:
      - '3003'
    networks:
      - profile

  money_research:
    image: ${REGISTRY}/qhr-profile-money-research:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BASE_PATH: /money-research
    expose:
      - '3004'
    networks:
      - profile

  node_notes:
    image: ${REGISTRY}/qhr-profile-node-notes:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      APP_CONFIG_ENV: production
      APP_CONFIG_PATH: /app/config/app.config.production.yaml
      DATABASE_URL: ${DATABASE_URL:-}
      NEXT_PUBLIC_BASE_PATH: /node-notes
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./app.config.yaml:/app/config/app.config.production.yaml:ro
    expose:
      - '3005'
    networks:
      - profile

  nginx:
    image: docker.m.daocloud.io/library/nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - calendar
      - teach_hub
      - showmasterpiece
      - money_research
      - node_notes
    ports:
      - '${GATEWAY_PORT:-3000}:80'
    volumes:
      - ./nginx/profile-platform.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy-params.conf:/etc/nginx/proxy-params.conf:ro
    networks:
      - profile

networks:
  profile:
    driver: bridge
