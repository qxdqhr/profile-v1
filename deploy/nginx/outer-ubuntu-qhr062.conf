# 宿主机 Ubuntu nginx（TLS 终止层）— 部署至 /etc/nginx/sites-available/qhr062.top
# 关键：必须把 X-Forwarded-Proto 传给 :3000 网关，否则 better-auth Cookie / 301 会落到 http

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name qhr062.top www.qhr062.top;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qhr062.top www.qhr062.top;

    # 证书路径按 certbot / 阿里云实际安装位置调整
    ssl_certificate     /etc/letsencrypt/live/qhr062.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qhr062.top/privkey.pem;

    client_max_body_size 52m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy-params-outer.conf;
    }
}
