# profile-platform 同域路径反代（方案 B）
# 挂载至 nginx /etc/nginx/conf.d/default.conf
# upstream 主机名与 deploy/docker-compose.gateway.yml 中 service 名一致

upstream profile_web {
    server web:3000;
    keepalive 32;
}

upstream profile_calendar {
    server calendar:3001;
    keepalive 16;
}

upstream profile_teach_hub {
    server teach_hub:3002;
    keepalive 16;
}

upstream profile_showmasterpiece {
    server showmasterpiece:3003;
    keepalive 16;
}

upstream profile_money_research {
    server money_research:3004;
    keepalive 16;
}

upstream profile_node_notes {
    server node_notes:3005;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 外层 HTTPS 终止时保留真实协议，供 better-auth 正确设置 Secure Cookie
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 52m;

    # --- legacy 实验田路径（显式 https，避免外层未传 X-Forwarded-Proto 时 301 落到 http）---
    location ~ ^/testField/calendar/?(.*)$ {
        return 301 https://$http_host/calendar/$1;
    }
    location ~ ^/testField/teachHub/?(.*)$ {
        return 301 https://$http_host/teach-hub/$1;
    }
    location ~ ^/testField/ShowMasterPieces/?(.*)$ {
        return 301 https://$http_host/showmasterpiece/$1;
    }
    location ~ ^/testField/nodeNotes/?(.*)$ {
        return 301 https://$http_host/node-notes/$1;
    }

    # --- calendar ---
    # Next basePath=/calendar：容器内真实 API 为 /calendar/api/calendar/*
    location /api/calendar/ {
        proxy_pass http://profile_calendar/calendar/api/calendar/;
        include /etc/nginx/proxy-params.conf;
    }
    location = /api/calendar {
        return 301 /api/calendar/;
    }
    # 前缀匹配：勿对 /calendar 强制加尾斜杠（Next basePath 默认 trailingSlash=false 会 308 去掉斜杠，与 301 形成死循环）
    location /calendar {
        proxy_pass http://profile_calendar;
        include /etc/nginx/proxy-params.conf;
    }

    # --- teach-hub ---
    # Next basePath=/teach-hub：容器内真实 API 为 /teach-hub/api/teach-hub/*
    location /api/teach-hub/ {
        proxy_pass http://profile_teach_hub/teach-hub/api/teach-hub/;
        include /etc/nginx/proxy-params.conf;
    }
    location = /api/teach-hub {
        return 301 /api/teach-hub/;
    }
    location /teach-hub {
        proxy_pass http://profile_teach_hub;
        include /etc/nginx/proxy-params.conf;
    }

    # --- showmasterpiece ---
    location /api/showmasterpiece/ {
        proxy_pass http://profile_showmasterpiece/showmasterpiece/api/showmasterpiece/;
        include /etc/nginx/proxy-params.conf;
    }
    location = /api/showmasterpiece {
        return 301 /api/showmasterpiece/;
    }
    location /showmasterpiece {
        proxy_pass http://profile_showmasterpiece;
        include /etc/nginx/proxy-params.conf;
    }

    # --- money-research ---
    location /money-research {
        proxy_pass http://profile_money_research;
        include /etc/nginx/proxy-params.conf;
    }

    # --- node-notes ---
    # Next basePath=/node-notes：容器内真实 API 为 /node-notes/api/node-notes/*
    location /api/node-notes/ {
        proxy_pass http://profile_node_notes/node-notes/api/node-notes/;
        include /etc/nginx/proxy-params.conf;
    }
    location = /api/node-notes {
        return 301 /api/node-notes/;
    }
    location /node-notes {
        proxy_pass http://profile_node_notes;
        include /etc/nginx/proxy-params.conf;
    }

    # --- 主站 auth（子应用 cookie 与 session 共用）---
    location /api/auth/ {
        proxy_pass http://profile_web;
        include /etc/nginx/proxy-params.conf;
    }

    # --- web 默认 ---
    location / {
        proxy_pass http://profile_web;
        include /etc/nginx/proxy-params.conf;
    }
}
